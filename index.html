<!doctype html>
<html>
  <head>
    <title>Maguire Thanksgivings</title>
    <meta charset="utf-8">
    <style>
      .grid_container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(275px, 1fr));
        grid-auto-rows: minmax(10em,1fr);
        grid-gap: 1em;
        place-items: center;
      }
      .grid_container > div {
        border: 1px solid #000;
        box-sizing: border-box;
        position: relative;
        place-items: center;
      }
      .grid-header {
        background-color: #ccc;
      }
      .grid-menu {
        background-color: #c0c0c0;
      }
      .grid-content {

      }
      .grid-panel {
        background-color: #eee;
      }
      .grid-footer {
        background-color: #ddd;
      }
      img {
        width: 15em;
        height: auto;
      }
    </style>
  </head>
  <body>
    <div class="grid_container">
      <div>
        <h3>Thanksgiving 1994</h3>
        <img src="images/1994_Menu.jpeg">
      </div>
      <div>

      </div>
      <div>

      </div>
      <div>

        <img src="images/2014_Menu.jpeg">
      </div>
      <div>

        <img src="images/2015_Menu.jpeg">
      </div>
      <div>

      <div>

      <div>

      <div>
